services:
  - type: web
    name: samapi
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SAMAPI_HOST
        value: 0.0.0.0
      - key: SAMAPI_WEB_DIR
        value: dist
      - key: SAMAPI_DATA_DIR
        value: /var/data
      - key: SAMAPI_ADMIN_COOKIE_SECURE
        value: "true"
      - key: SAMAPI_ADMIN_PASSWORD
        sync: false
      - key: SAMAPI_ADMIN_SESSION_SECRET
        generateValue: true
    disk:
      name: samapi-data
      mountPath: /var/data
      sizeGB: 1
